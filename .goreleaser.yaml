version: 2

project_name: ccsession

before:
  hooks:
    - go mod tidy
    # goreleaser builds with -mod=vendor when vendor/ exists; keep it in sync
    # so a vendored dependency can't fail the release with "inconsistent vendoring".
    - go mod vendor

builds:
  - id: ccsession
    main: ./cmd/ccsession
    binary: ccsession
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: ccsession
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: sorafujitani
    name: ccsession
  draft: false
  prerelease: auto
  name_template: "ccsession {{ .Version }}"
  header: |
    ## ccsession {{ .Version }}

    `claude --resume` のための fzf フロントエンド。
  footer: |
    ---
    インストール手順は README を参照。

# Homebrew tap への公開。`sorafujitani/homebrew-tap` へ push できる PAT を
# CI の secret `HOMEBREW_TAP_GITHUB_TOKEN` に登録すると、タグを切るたびに
# Formula/ccsession.rb が自動更新される。
brews:
  - name: ccsession
    repository:
      owner: sorafujitani
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sorafujitani/ccsession"
    description: "Fuzzy session picker for claude --resume"
    license: "MIT"
    dependencies:
      - name: fzf
    install: |
      bin.install "ccsession"
    test: |
      system "#{bin}/ccsession", "--version"
    caveats: |
      ccsession resumes sessions through the `claude` CLI (Claude Code), which
      is not distributed via Homebrew. Install it separately:
        https://docs.claude.com/en/docs/claude-code
