version: 2

project_name: ccsession

before:
  hooks:
    - go mod tidy

builds:
  - id: ccsession
    main: ./cmd/ccsession
    binary: ccsession
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: ccsession
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: sorafujitani
    name: ccsession
  draft: false
  prerelease: auto
  name_template: "ccsession {{ .Version }}"
  header: |
    ## ccsession {{ .Version }}

    `claude --resume` のための fzf フロントエンド。
  footer: |
    ---
    インストール手順は README を参照。

